<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OssamIO MX-12B Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="calculator-container">
    <div class="calculator-body">
      <!-- Screen Area (Angled) -->
      <div class="screen-area">
        <div class="brand-row">
          <div class="brand-left">
            <span class="brand-name">OssamIO</span>
            <span class="model-name">MX-12B</span>
          </div>
          <div class="brand-right">
            <span class="digits-badge">12 DIGITS</span>
          </div>
        </div>
        
        <div class="display-bezel">
          <div class="solar-panel">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
          </div>
          <div class="lcd-screen">
            <div class="indicators">
              <span id="ind-m" class="ind hidden">M</span>
              <span id="ind-e" class="ind hidden">E</span>
            </div>
            <div class="lcd-value" id="display">0</div>
          </div>
        </div>
      </div>

      <!-- Keypad Area -->
      <div class="keypad">
        <button class="btn fn btn-red" data-key="ac">ON/AC</button>
        <button class="btn fn btn-red" data-key="c">C</button>
        <button class="btn fn btn-light" data-key="%">%</button>
        <button class="btn fn btn-light" data-key="sqrt">√</button>

        <button class="btn mem btn-light" data-key="mc">MC</button>
        <button class="btn mem btn-light" data-key="mr">MR</button>
        <button class="btn mem btn-light" data-key="m-">M-</button>
        <button class="btn mem btn-light" data-key="m+">M+</button>

        <button class="btn num btn-dark" data-key="7">7</button>
        <button class="btn num btn-dark" data-key="8">8</button>
        <button class="btn num btn-dark" data-key="9">9</button>
        <button class="btn op btn-light" data-key="/">÷</button>

        <button class="btn num btn-dark" data-key="4">4</button>
        <button class="btn num btn-dark" data-key="5">5</button>
        <button class="btn num btn-dark" data-key="6">6</button>
        <button class="btn op btn-light" data-key="*">×</button>

        <button class="btn num btn-dark" data-key="1">1</button>
        <button class="btn num btn-dark" data-key="2">2</button>
        <button class="btn num btn-dark" data-key="3">3</button>
        <button class="btn op btn-light" data-key="-">-</button>

        <button class="btn num btn-dark" data-key="0">0</button>
        <button class="btn num btn-dark" data-key="00">00</button>
        <button class="btn num btn-dark" data-key=".">.</button>
        <button class="btn op btn-light" data-key="+">+</button>

        <button class="btn fn btn-light span-2" data-key="+/-">+/-</button>
        <button class="btn op btn-light span-2" data-key="=">=</button>
      </div>
    </div>
  </div>
  <script src="calculator.js"></script>
</body>
</html>
